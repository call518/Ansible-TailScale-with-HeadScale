---
common_supported_distributions:
  - Ubuntu
common_supported_distribution_version_pattern: '^26[.]04([.].*)?$'
common_os_packages: "{{ common_packages_debian }}"
common_chrony_config_path: /etc/chrony/chrony.conf
common_chrony_service: chrony
common_ca_trust_directory: /usr/local/share/ca-certificates
common_ca_update_command:
  - update-ca-certificates
headscale_nologin_shell: /usr/sbin/nologin
tailscale_repository_type: apt
tailscale_apt_key_url: https://pkgs.tailscale.com/stable/ubuntu/resolute.noarmor.gpg
tailscale_apt_key_path: /usr/share/keyrings/tailscale-archive-keyring.gpg
tailscale_repo_url: https://pkgs.tailscale.com/stable/ubuntu/resolute.tailscale-keyring.list
tailscale_repo_path: /etc/apt/sources.list.d/tailscale.list
