---
- name: Validate SSH bootstrap inputs
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - ssh_bootstrap
  tasks:
    - name: Validate SSH bootstrap controller inputs
      ansible.builtin.include_role:
        name: ssh_bootstrap
        tasks_from: validate

- name: Bootstrap passwordless SSH access in parallel
  hosts: tailscale
  become: false
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  vars:
    ansible_become: false
    ansible_password: >-
      {{ (vault_ssh_passwords | default({})).get(
           inventory_hostname, vault_ssh_root_password | default('')) }}
    ansible_ssh_timeout: "{{ ssh_bootstrap_connect_timeout }}"
  tags:
    - ssh_bootstrap
  roles:
    - role: ssh_bootstrap
      tags:
        - ssh_bootstrap

- name: Gate deployment on complete SSH bootstrap results
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - ssh_bootstrap
  tasks:
    - name: Initialize SSH bootstrap failure list
      ansible.builtin.set_fact:
        ssh_bootstrap_failures: []
      when: ssh_bootstrap_enabled | bool

    - name: Collect failed SSH bootstrap hosts
      ansible.builtin.set_fact:
        ssh_bootstrap_failures: >-
          {{ ssh_bootstrap_failures +
             [{'host': item,
               'address': hostvars[item].ansible_host,
               'stage': host_result.stage,
               'message': host_result.message}] }}
      vars:
        host_result: >-
          {{ hostvars[item].ssh_bootstrap_result |
             default({'succeeded': false,
                      'stage': 'missing_result',
                      'message': 'No bootstrap result was recorded'}) }}
      loop: "{{ groups['tailscale'] }}"
      loop_control:
        label: "{{ item }} ({{ hostvars[item].ansible_host }})"
      when:
        - ssh_bootstrap_enabled | bool
        - not (host_result.succeeded | bool)

    - name: Print SSH bootstrap summary header
      ansible.builtin.debug:
        msg: "SSH Bootstrap summary:"
      when: ssh_bootstrap_enabled | bool

    - name: Report SSH bootstrap status for every host
      ansible.builtin.debug:
        msg: >-
          {{ item }} ({{ hostvars[item].ansible_host }}):
          {{ '[SUCCEEDED]' if host_result.succeeded else
             '[FAILED] stage=' ~ host_result.stage ~
             ' reason=' ~ host_result.message }}
      vars:
        host_result: >-
          {{ hostvars[item].ssh_bootstrap_result |
             default({'succeeded': false,
                      'stage': 'missing_result',
                      'message': 'No bootstrap result was recorded'}) }}
      loop: "{{ groups['tailscale'] }}"
      loop_control:
        label: "{{ item }} ({{ hostvars[item].ansible_host }})"
      when: ssh_bootstrap_enabled | bool

    - name: Print SSH bootstrap summary footer
      ansible.builtin.debug:
        msg: >-
          {% if ssh_bootstrap_failures | length > 0 %}
          SSH Bootstrap failed on {{ ssh_bootstrap_failures | length }} of
          {{ groups['tailscale'] | length }} hosts:
          {{ ssh_bootstrap_failures | map(attribute='host') | join(', ') }}.
          Subsequent deployment plays were not started.
          {% else %}
          SSH Bootstrap succeeded on all {{ groups['tailscale'] | length }} hosts.
          Subsequent deployment plays may now start.
          {% endif %}
      when: ssh_bootstrap_enabled | bool

    - name: Stop deployment when any SSH bootstrap failed
      ansible.builtin.assert:
        that:
          - ssh_bootstrap_failures | length == 0
        fail_msg: >-
          SSH bootstrap failed on {{ ssh_bootstrap_failures | length }} host(s):
          {{ ssh_bootstrap_failures | map(attribute='host') | join(', ') }}.
          Fix all listed hosts and rerun; no deployment play has started.
      when: ssh_bootstrap_enabled | bool

- name: Apply common baseline
  hosts: tailscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - common
  roles:
    - role: os_compat
    - role: common
      tags:
        - common

- name: Install and configure Headscale
  hosts: headscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - headscale
  roles:
    - role: os_compat
    - role: headscale
      tags:
        - headscale

- name: Install Docker CE and Headplane
  hosts: headscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - headplane
  roles:
    - role: os_compat
      when: headplane_enabled | bool
    - role: headplane
      when: headplane_enabled | bool
      tags:
        - headplane

- name: Install and register Tailscale subnet routers
  hosts: tailscale_routers
  become: true
  gather_facts: true
  serial: 1
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - tailscale_router
  roles:
    - role: os_compat
    - role: tailscale_router
      tags:
        - tailscale_router

- name: Approve advertised subnet routes
  hosts: headscale
  become: true
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - route_approval
  tasks:
    - name: Read registered Headscale nodes
      ansible.builtin.command:
        argv: ["{{ headscale_binary_path }}", nodes, list, --output, json]
      register: registered_headscale_nodes
      changed_when: false

    - name: Validate router registration in Headscale
      ansible.builtin.assert:
        that:
          - >-
            registered_headscale_nodes.stdout | from_json |
            selectattr('name', 'equalto', item) | list | length == 1
        fail_msg: >-
          Router '{{ item }}' is not uniquely registered in Headscale. Check
          'headscale nodes list' before approving routes.
      loop: "{{ groups['tailscale_routers'] }}"
      loop_control:
        label: "{{ item }}"

    - name: Resolve router Headscale node IDs
      ansible.builtin.set_fact:
        headscale_router_node_ids: >-
          {{ headscale_router_node_ids | default({}) |
             combine({item: (registered_headscale_nodes.stdout | from_json |
                             selectattr('name', 'equalto', item) |
                             map(attribute='id') | first)}) }}
      loop: "{{ groups['tailscale_routers'] }}"
      loop_control:
        label: "{{ item }}"

    - name: Approve each router's advertised route
      ansible.builtin.command:
        argv:
          - "{{ headscale_binary_path }}"
          - nodes
          - approve-routes
          - --identifier
          - "{{ headscale_router_node_ids[item] }}"
          - --routes
          - "{{ hostvars[item].site_cidr }}"
      loop: "{{ groups['tailscale_routers'] }}"
      register: route_approval
      changed_when: "'already approved' not in (route_approval.stdout | lower)"
      retries: 6
      delay: 5
      until: route_approval.rc == 0

- name: Validate Site-to-Site routing with temporary network namespaces
  hosts: "{{ groups['site_test_endpoints'] | default([]) }}"
  become: true
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - site_test_endpoint
  roles:
    - role: site_test_endpoint
      tags:
        - site_test_endpoint
