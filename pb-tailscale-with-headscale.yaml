---
- name: Validate SSH bootstrap inputs
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - ssh_bootstrap
  tasks:
    - name: Validate SSH bootstrap controller inputs
      ansible.builtin.include_role:
        name: ssh_bootstrap
        tasks_from: validate

- name: Bootstrap passwordless SSH access in parallel
  hosts: tailscale
  become: false
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  vars:
    ansible_become: false
    ansible_password: >-
      {{ (vault_ssh_passwords | default({})).get(
           inventory_hostname, vault_ssh_common_password | default('')) }}
    ansible_ssh_timeout: "{{ ssh_bootstrap_connect_timeout }}"
  tags:
    - ssh_bootstrap
  roles:
    - role: ssh_bootstrap
      tags:
        - ssh_bootstrap

- name: Gate deployment on complete SSH bootstrap results
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - ssh_bootstrap
  tasks:
    - name: Evaluate SSH bootstrap results
      ansible.builtin.include_role:
        name: ssh_bootstrap
        tasks_from: gate

- name: Apply common baseline
  hosts: tailscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - common
  roles:
    - role: os_compat
    - role: common
      tags:
        - common

- name: Install and configure Headscale
  hosts: headscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - headscale
  roles:
    - role: os_compat
    - role: headscale
      tags:
        - headscale

- name: Install Docker CE and Headplane
  hosts: headscale
  become: true
  gather_facts: true
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - headplane
  roles:
    - role: os_compat
      when: headplane_enabled | bool
    - role: headplane
      when: headplane_enabled | bool
      tags:
        - headplane

- name: Install and register Tailscale subnet routers
  hosts: tailscale_routers
  become: true
  gather_facts: true
  serial: 1
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - tailscale_router
  roles:
    - role: os_compat
    - role: tailscale_router
      tags:
        - tailscale_router

- name: Manage Headscale routers and approve subnet routes
  hosts: headscale
  become: true
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - route_approval
  roles:
    - role: router_mgmt
      tags:
        - route_approval

- name: Validate Site-to-Site routing with temporary network namespaces
  hosts: "{{ groups['site_test_endpoints'] | default([]) }}"
  become: true
  gather_facts: false
  vars_files:
    - vars-common.yaml
    - "{{ 'vars-vault.yaml' if lookup('ansible.builtin.fileglob', playbook_dir + '/vars-vault.yaml') else [] }}"
  tags:
    - site_test_endpoint
  roles:
    - role: site_test_endpoint
      tags:
        - site_test_endpoint
