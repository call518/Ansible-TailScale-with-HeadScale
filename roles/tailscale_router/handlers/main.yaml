---
- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart tailscaled
  ansible.builtin.service:
    name: tailscaled
    state: restarted

- name: Reload firewalld
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  notify: Restart Tailscale MSS clamping

- name: Restart Tailscale MSS clamping
  ansible.builtin.systemd_service:
    name: tailscale-mss-clamping
    enabled: true
    state: restarted
    daemon_reload: true
  when: tailscale_manage_mss_clamping | bool
