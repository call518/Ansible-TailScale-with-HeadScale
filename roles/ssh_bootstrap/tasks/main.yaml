---
- name: End disabled SSH bootstrap play
  ansible.builtin.meta: end_play
  when: not (ssh_bootstrap_enabled | bool)

- name: Initialize SSH bootstrap result
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: pending
      message: Bootstrap has not completed

- name: Record missing vaulted SSH password
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: vault_validation
      message: No host-specific or common vaulted SSH password is available
  when: ansible_password | length == 0

- name: Test initial SSH authentication and connectivity
  ansible.builtin.wait_for_connection:
    connect_timeout: "{{ ssh_bootstrap_connect_timeout }}"
    timeout: "{{ ssh_bootstrap_connect_timeout }}"
  register: ssh_bootstrap_connection
  ignore_errors: true
  ignore_unreachable: true
  when: ssh_bootstrap_result.stage == 'pending'

- name: Record SSH authentication or connectivity failure
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: authentication
      message: SSH authentication or connectivity failed
  when:
    - ssh_bootstrap_result.stage == 'pending'
    - >-
      ssh_bootstrap_connection is failed or
      ssh_bootstrap_connection.unreachable | default(false) | bool

- name: Read SSH account from passwd database
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"
  register: ssh_bootstrap_account
  ignore_errors: true
  ignore_unreachable: true
  when: ssh_bootstrap_result.stage == 'pending'

- name: Record SSH account lookup failure
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: account_lookup
      message: SSH login account was not found in the passwd database
  when:
    - ssh_bootstrap_result.stage == 'pending'
    - >-
      ssh_bootstrap_account is failed or
      ssh_bootstrap_account.unreachable | default(false) | bool

- name: Create SSH directory for login account
  ansible.builtin.file:
    path: "{{ getent_passwd[ansible_user][4] }}/.ssh"
    state: directory
    mode: "0700"
  register: ssh_bootstrap_directory
  ignore_errors: true
  ignore_unreachable: true
  when: ssh_bootstrap_result.stage == 'pending'

- name: Record SSH directory creation failure
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: ssh_directory
      message: Failed to create the SSH directory for the login account
  when:
    - ssh_bootstrap_result.stage == 'pending'
    - >-
      ssh_bootstrap_directory is failed or
      ssh_bootstrap_directory.unreachable | default(false) | bool

- name: Install controller public key for login account
  ansible.builtin.lineinfile:
    path: "{{ getent_passwd[ansible_user][4] }}/.ssh/authorized_keys"
    line: "{{ lookup('ansible.builtin.file', ssh_bootstrap_public_key_file) }}"
    create: true
    mode: "0600"
  register: ssh_bootstrap_authorized_key
  ignore_errors: true
  ignore_unreachable: true
  when: ssh_bootstrap_result.stage == 'pending'

- name: Record authorized keys update failure
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: false
      stage: authorized_keys
      message: Failed to install the controller public key
  when:
    - ssh_bootstrap_result.stage == 'pending'
    - >-
      ssh_bootstrap_authorized_key is failed or
      ssh_bootstrap_authorized_key.unreachable | default(false) | bool

- name: Record successful SSH bootstrap
  ansible.builtin.set_fact:
    ssh_bootstrap_result:
      succeeded: true
      stage: complete
      message: Controller public key is installed
  when: ssh_bootstrap_result.stage == 'pending'
