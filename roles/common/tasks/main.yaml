---
- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Read current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ common_timezone }}"
  when: current_timezone.stdout != common_timezone
  changed_when: true

- name: Manage Tailnet host mappings
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED HEADSCALE LAB"
    block: "{{ lookup('ansible.builtin.template', 'hosts.j2') }}"

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_os_packages + ['chrony'] }}"
    state: present

- name: Install firewalld when managed
  ansible.builtin.dnf:
    name: firewalld
    state: present
  when: common_manage_firewalld | bool

- name: Configure NTP servers
  ansible.builtin.blockinfile:
    path: "{{ common_chrony_config_path }}"
    marker: "# {mark} ANSIBLE MANAGED NTP SERVERS"
    block: |-
      {% for server in common_ntp_servers %}
      server {{ server }} iburst
      {% endfor %}
    state: "{{ 'present' if common_ntp_servers | length > 0 else 'absent' }}"
  notify: Restart chrony

- name: Enable time synchronization
  ansible.builtin.service:
    name: "{{ common_chrony_service }}"
    enabled: true
    state: started

- name: Enable firewalld
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  when: common_manage_firewalld | bool
