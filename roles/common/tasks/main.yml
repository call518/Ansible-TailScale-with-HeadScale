---
- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Read current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ common_timezone }}"
  when: current_timezone.stdout != common_timezone
  changed_when: true

- name: Manage lab host mappings
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED HEADSCALE LAB"
    block: "{{ lookup('ansible.builtin.template', 'hosts.j2') }}"

- name: Install common packages
  ansible.builtin.dnf:
    name: "{{ common_packages + ['chrony'] }}"
    state: present

- name: Configure internal NTP servers
  ansible.builtin.template:
    src: chrony-ansible.conf.j2
    dest: /etc/chrony.d/ansible.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chronyd

- name: Enable time synchronization
  ansible.builtin.service:
    name: chronyd
    enabled: true
    state: started

- name: Enable firewalld
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  when: common_manage_firewalld | bool
