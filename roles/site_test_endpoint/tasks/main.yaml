---
- name: End disabled Site-to-Site endpoint validation
  ansible.builtin.meta: end_play
  when: not (tailscale_site_test_enabled | bool)

- name: Validate Site-to-Site endpoint variables
  ansible.builtin.assert:
    that:
      - site_test_ip is defined
      - site_test_ip | length > 0
      - site_test_gateway is defined
      - site_test_gateway | length > 0
      - site_nic is defined
      - site_nic | length > 0
      - site_cidr is defined
      - "'/' in site_cidr"
      - groups['site_test_endpoints'] | default([]) | length > 1
    fail_msg: >-
      Each site_test_endpoints host requires site_test_ip and site_test_gateway,
      and its tailscale_routers entry requires site_nic and site_cidr.
      Validation also requires at least two test endpoints.

- name: Install temporary Site endpoint setup script
  ansible.builtin.template:
    src: site-test-endpoint.sh.j2
    dest: /usr/local/sbin/tailscale-site-test-endpoint
    owner: root
    group: root
    mode: "0755"

- name: Create temporary Site endpoint
  ansible.builtin.command: /usr/local/sbin/tailscale-site-test-endpoint setup
  changed_when: true

- name: Validate Site-to-Site endpoint connectivity
  block:
    - name: Test remote Site endpoints
      ansible.builtin.command:
        argv:
          - /usr/local/sbin/tailscale-site-test-endpoint
          - probe
          - "{{ hostvars[item].site_test_ip }}"
      loop: >-
        {{ groups['site_test_endpoints'] | default([]) |
           difference([inventory_hostname]) }}
      loop_control:
        label: "{{ inventory_hostname }} -> {{ item }} ({{ hostvars[item].site_test_ip }})"
      changed_when: false
  always:
    - name: Remove temporary Site endpoint after validation
      ansible.builtin.command: /usr/local/sbin/tailscale-site-test-endpoint cleanup
      when: tailscale_site_test_cleanup_after_validation | bool
      changed_when: true
