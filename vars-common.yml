---
# 접속/공통 OS 설정
common_timezone: Asia/Seoul
common_ntp_servers: []  # 폐쇄망 예: ["192.168.156.1"]
common_packages:
  - curl
  - wget
  - jq
  - openssl
  - tar
  - firewalld
  - iproute
  - iputils
  - bind-utils
  - tcpdump
  - traceroute
  - nmap-ncat
common_manage_firewalld: true

# 모든 노드의 관리망 이름/IP. /etc/hosts와 인증서 SAN에 반영된다.
lab_hosts:
  - { name: tailscale-head, ip: 192.168.156.100 }
  - { name: tailscale-01, ip: 192.168.156.101 }
  - { name: tailscale-02, ip: 192.168.156.102 }

# Headscale
headscale_host: tailscale-head
headscale_ip: 192.168.156.100
headscale_version: "0.29.1"
headscale_arch: amd64
headscale_binary_path: /usr/local/bin/headscale
headscale_config_dir: /etc/headscale
headscale_data_dir: /var/lib/headscale
headscale_runtime_dir: /run/headscale
headscale_pki_dir: /root/headscale-pki
headscale_user: headscale
headscale_group: headscale
headscale_namespace: lab
headscale_listen_port: 443
headscale_url: "https://{{ headscale_host }}:{{ headscale_listen_port }}"
headscale_stun_port: 3478
headscale_derp_region_id: 999
headscale_tailnet_v4_prefix: 100.64.0.0/10
headscale_tailnet_v6_prefix: fd7a:115c:a1e0::/48
headscale_dns_domain: tailnet.internal
headscale_binary_checksum: ""  # 운영에서는 sha256:<공식 체크섬> 권장

# 내부 CA/TLS. 값 변경 시 인증서를 다시 생성하고 전 노드 trust store에 반영한다.
headscale_ca_days: 3650
headscale_cert_days: 1825
headscale_ca_dn:
  country: KR
  state: Gyeongsangnam-do
  locality: Hadong
  organization: Headscale-Lab
  organizational_unit: Infrastructure
  common_name: Headscale Lab Root CA
headscale_cert_dns_sans:
  - tailscale-head
  - tailscale-head.local
headscale_cert_ip_sans:
  - "{{ headscale_ip }}"

# Tailscale subnet router
tailscale_repo_url: https://pkgs.tailscale.com/stable/rhel/9/tailscale.repo
tailscale_repo_path: /etc/yum.repos.d/tailscale.repo
tailscale_package: tailscale
tailscale_udp_port: 41641
tailscale_accept_routes: true
tailscale_accept_dns: false
tailscale_snat_subnet_routes: false
tailscale_manage_ipv6_forwarding: true
tailscale_router_sites:
  tailscale-01:
    site_nic: ens224
    site_cidr: 10.10.10.0/24
  tailscale-02:
    site_nic: ens224
    site_cidr: 10.10.20.0/24
